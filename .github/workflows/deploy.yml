name: Deploy Firebase

on:
  push:
    branches:
      - main

env:
  FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
  FUNCTIONS_HEALTH_URL: ${{ secrets.FUNCTIONS_HEALTH_URL }}
  VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
  VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
  VITE_GOOGLE_MAP_ID: ${{ secrets.VITE_GOOGLE_MAP_ID }}
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: deployed
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || vars.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.FIREBASE_WORKLOAD_IDENTITY_PROVIDER || vars.FIREBASE_WORKLOAD_IDENTITY_PROVIDER }}
      FIREBASE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EMAIL || vars.FIREBASE_SERVICE_ACCOUNT_EMAIL }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Enable corepack and pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.18.1 --activate

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Validate deployment authentication
        id: auth_config
        run: |
          test -n "$FIREBASE_PROJECT_ID" || { echo "Set FIREBASE_PROJECT_ID in repository/environment secrets or variables before deploying."; exit 1; }
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "method=credentials_json" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$FIREBASE_WORKLOAD_IDENTITY_PROVIDER" ]; then
            test -n "$FIREBASE_SERVICE_ACCOUNT_EMAIL" || { echo "Set FIREBASE_SERVICE_ACCOUNT_EMAIL in repository/environment secrets or variables when using Workload Identity Federation."; exit 1; }
            echo "method=workload_identity" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Set FIREBASE_SERVICE_ACCOUNT_JSON or FIREBASE_WORKLOAD_IDENTITY_PROVIDER before deploying." >&2
          exit 1

      - name: Authenticate to Google Cloud with service account key
        if: ${{ steps.auth_config.outputs.method == 'credentials_json' }}
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON }}
          project_id: ${{ env.FIREBASE_PROJECT_ID }}

      - name: Authenticate to Google Cloud with Workload Identity Federation
        if: ${{ steps.auth_config.outputs.method == 'workload_identity' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.FIREBASE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.FIREBASE_SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ env.FIREBASE_PROJECT_ID }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Validate configuration
        run: |
          gcloud config set project "$FIREBASE_PROJECT_ID"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.5.1

      - name: Confirm Firebase target project
        run: firebase projects:list | grep "$FIREBASE_PROJECT_ID"

      - name: Lint
        run: corepack pnpm lint

      - name: Build frontend
        run: corepack pnpm --filter crowdpm-frontend build

      - name: Build functions
        run: corepack pnpm --filter crowdpm-functions build

      - name: Determine diff base
        id: diffbase
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          before_ref="$BEFORE_SHA"
          if [ -z "$before_ref" ] || [ "$before_ref" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              before_ref="$(git rev-parse HEAD^)"
            else
              before_ref="$(git rev-list --max-parents=0 HEAD)"
            fi
          fi
          echo "sha=$before_ref" >> "$GITHUB_OUTPUT"

      - name: Detect Firestore rules changes
        id: firestore
        run: |
          if git diff --name-only "${{ steps.diffbase.outputs.sha }}" HEAD | grep -q '^firestore.rules$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Firestore index changes
        id: firestore_indexes
        run: |
          if git diff --name-only "${{ steps.diffbase.outputs.sha }}" HEAD | grep -q '^firestore.indexes.json$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Storage rules changes
        id: storage
        run: |
          if git diff --name-only "${{ steps.diffbase.outputs.sha }}" HEAD | grep -q '^storage.rules$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Firestore indexes
        if: ${{ steps.firestore_indexes.outputs.changed == 'true' }}
        run: firebase deploy --only firestore:indexes --project "$FIREBASE_PROJECT_ID" --force

      - name: Verify Firestore field overrides
        if: ${{ steps.firestore_indexes.outputs.changed == 'true' }}
        run: |
          firebase firestore:indexes --project "$FIREBASE_PROJECT_ID" > /tmp/remote-indexes.json
          node -e '
            const fs = require("fs");
            const local = JSON.parse(fs.readFileSync("firestore.indexes.json", "utf8"));
            const remote = JSON.parse(fs.readFileSync("/tmp/remote-indexes.json", "utf8"));
            const normalize = (field) => {
              const indexes = (field.indexes || [])
                .map((idx) => JSON.stringify({
                  order: idx.order || null,
                  arrayConfig: idx.arrayConfig || null,
                  queryScope: idx.queryScope || null,
                }))
                .sort();
              return JSON.stringify({
                collectionGroup: field.collectionGroup,
                fieldPath: field.fieldPath,
                ttl: !!field.ttl,
                indexes,
              });
            };
            const localOverrides = local.fieldOverrides || [];
            const remoteSet = new Set((remote.fieldOverrides || []).map(normalize));
            const missing = localOverrides.filter((field) => !remoteSet.has(normalize(field)));
            if (missing.length > 0) {
              console.error("Missing deployed fieldOverrides:", JSON.stringify(missing, null, 2));
              process.exit(1);
            }
            console.log(`Verified ${localOverrides.length} fieldOverrides.`);
          '

      - name: Wait for Firestore indexes
        if: ${{ steps.firestore_indexes.outputs.changed == 'true' }}
        run: |
          echo "Waiting for Firestore indexes to finish building..."
          end=$((SECONDS + 900))
          while [ $SECONDS -lt $end ]; do
            states="$(gcloud firestore indexes composite list --project "$FIREBASE_PROJECT_ID" --format='value(state)' | sort -u)"
            if [ -z "$states" ]; then
              echo "No composite indexes found; skipping wait."
              break
            fi
            if ! echo "$states" | grep -q 'CREATING'; then
              echo "All indexes are ready."
              break
            fi
            echo "Indexes still building (states: $states); checking again in 30s..."
            sleep 30
          done
          if [ $SECONDS -ge $end ]; then
            echo "::warning::Timed out waiting for Firestore indexes to finish building. Check the Firebase console for progress."
          fi

      - name: Deploy hosting and functions
        run: firebase deploy --only hosting,functions --project "$FIREBASE_PROJECT_ID" --force

      - name: Deploy Firestore rules
        if: ${{ steps.firestore.outputs.changed == 'true' }}
        run: firebase deploy --only firestore:rules --project "$FIREBASE_PROJECT_ID"

      - name: Deploy Storage rules
        if: ${{ steps.storage.outputs.changed == 'true' }}
        run: firebase deploy --only storage --project "$FIREBASE_PROJECT_ID"

      - name: Frontend smoke test
        if: ${{ env.FRONTEND_URL }}
        run: |
          curl --fail --silent --show-error "$FRONTEND_URL" >/dev/null

      - name: API health check
        if: ${{ env.FUNCTIONS_HEALTH_URL }}
        run: |
          curl --fail --silent --show-error "$FUNCTIONS_HEALTH_URL"
